<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Grille responsive – Bootstrap 5.3.8</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5.3.8 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container py-4">
      <h1>Exemple de grille responsive (Bootstrap 5.3.8)</h1>

      <!-- Label dynamique pour afficher la largeur + breakpoint -->
      <div class="label-container">
        <span id="screen-size-label">Taille de l'écran : </span>
      </div>

      <!-- Grille XS : une colonne pleine largeur -->
      <div class="row mb-3">
        <div class="col-12 card-demo">col-12 (XS)</div>
      </div>

      <!-- Grille SM -->
      <div class="row mb-3">
        <div class="col-sm-6 card-demo">col-sm-6</div>
        <div class="col-sm-6 card-demo">col-sm-6</div>
      </div>

      <!-- Grille MD / LG / XL / XXL mélangées -->
      <div class="row mb-3">
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
        <div class="col-sm-4 col-md-6 col-lg-4 col-xl-2 col-xxl-1 card-demo">
          Bloc
        </div>
      </div>

      <!-- Autre exemple simple MD / LG -->
      <div class="row mb-3">
        <div class="col-md-4 card-demo">col-md-4</div>
        <div class="col-md-4 card-demo">col-md-4</div>
        <div class="col-md-4 card-demo">col-md-4</div>
      </div>

      <div class="row">
        <div class="col-lg-3 card-demo">col-lg-3</div>
        <div class="col-lg-3 card-demo">col-lg-3</div>
        <div class="col-lg-3 card-demo">col-lg-3</div>
        <div class="col-lg-3 card-demo">col-lg-3</div>
      </div>
    </div>

    <!-- Bootstrap 5.3.8 JS (bundle + Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function updateScreenSizeLabel() {
        const width = window.innerWidth;
        let label = "Taille de l'écran : " + width + "px - ";

        if (width >= 1400) {
          label += "xxl (≥ 1400px)";
        } else if (width >= 1200) {
          label += "xl (≥ 1200px)";
        } else if (width >= 992) {
          label += "lg (≥ 992px)";
        } else if (width >= 768) {
          label += "md (≥ 768px)";
        } else if (width >= 576) {
          label += "sm (≥ 576px)";
        } else {
          label += "xs (< 576px)";
        }

        document.getElementById("screen-size-label").textContent = label;
      }

      // Au chargement
      document.addEventListener("DOMContentLoaded", updateScreenSizeLabel);
      // Au redimensionnement
      window.addEventListener("resize", updateScreenSizeLabel);
    </script>
  </body>
</html>
