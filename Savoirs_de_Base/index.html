<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 1 — CDA Lille</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #fafafa;
            --surface:  #ffffff;
            --border:   #e5e7eb;
            --text:     #111827;
            --muted:    #6b7280;
            --subtle:   #f3f4f6;
            --accent:   #111827;
            --font:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --mono:     'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        html { font-size: 16px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── LAYOUT ── */
        .wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 64px 24px 96px;
        }

        /* ── BREADCRUMB ── */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .8rem;
            color: var(--muted);
            margin-bottom: 48px;
            font-family: var(--mono);
        }
        .breadcrumb a {
            color: var(--muted);
            text-decoration: none;
            transition: color .15s;
        }
        .breadcrumb a:hover { color: var(--text); }
        .breadcrumb .sep { opacity: .4; }

        /* ── HEADER ── */
        .header { margin-bottom: 48px; }
        .header .label {
            font-family: var(--mono);
            font-size: .72rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -.03em;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .header p {
            color: var(--muted);
            font-size: .95rem;
            line-height: 1.6;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 32px 0;
        }

        /* ── SEQUENCE LIST ── */
        .seq-list { display: flex; flex-direction: column; gap: 2px; }

        .seq-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            transition: background .12s;
            border: 1px solid transparent;
        }
        .seq-item:hover {
            background: var(--surface);
            border-color: var(--border);
        }

        .seq-num {
            font-family: var(--mono);
            font-size: .72rem;
            color: var(--muted);
            width: 28px;
            flex-shrink: 0;
        }

        .seq-info { flex: 1; }
        .seq-title {
            font-size: .92rem;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .seq-desc {
            font-size: .78rem;
            color: var(--muted);
        }

        .seq-arrow {
            color: var(--border);
            font-size: .9rem;
            transition: transform .15s, color .15s;
        }
        .seq-item:hover .seq-arrow {
            color: var(--muted);
            transform: translateX(3px);
        }

        /* ── FOOTER ── */
        .footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: .78rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer a { color: var(--muted); text-decoration: none; }
        .footer a:hover { color: var(--text); }
    </style>
</head>
